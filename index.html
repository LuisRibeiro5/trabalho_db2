<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Endereços</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f4f7f6;
            --text-color: #333;
            --border-radius: 8px;
        }
    
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
    
        h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }
    
        form {
            background: white;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            transition: transform 0.2s;
        }
    
        form:hover {
            transform: translateY(-2px);
        }
    
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
    
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }
    
        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }
    
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
    
        button:hover {
            background-color: #357abd;
        }
    </style>
</head>

<body>

    <h2>1. Cadastrar País</h2>
    <form id="formPais">
        <label>Nome do País:</label>
        <input type="text" name="pais" id="pais" required>
        <button type="submit">Cadastrar País</button>
    </form>

    <h2>2. Cadastrar Cidade</h2>
    <form id="formCidade">
        <label>Nome da Cidade:</label>
        <input type="text" name="cidade" id="cidade" required>

        <label>Nome do País:</label>
        <select name="pais_cidade" id="pais_cidade" required></select>
        
        <button type="submit">Cadastrar Cidade</button>
    </form>

    <h2>3. Cadastrar Endereço Completo</h2>
    <form id="formEndereco">
        <label>Rua e Número:</label>
        <input type="text" name="endereco" id="endereco" required>

        <label>Cidade:</label>
        <select name="cidade_endereco" id="cidade_endereco" required></select>

        <button type="submit">Cadastrar Endereço</button>
    </form>

    <script>
        // --- FUNÇÕES DE CARREGAMENTO (GET) ---
        async function loadData() {
            try {
                const cidadesResponse = await fetch('http://localhost:3000/listarCidades');
                const cidades = await cidadesResponse.json();
                preencherSelectCidades(cidades);

                const paisesResponse = await fetch('http://localhost:3000/listarPaises');
                const paises = await paisesResponse.json();
                preencherSelectPaises(paises);
            } catch (err) {
                console.error('Erro ao carregar dados:', err);
            }
        }

        function preencherSelectPaises(lista) {
            const select = document.getElementById("pais_cidade");
            if (!select) return;
            select.innerHTML = '<option value="">Selecione um país...</option>';
            lista.forEach(item => {
                const option = document.createElement('option');
                option.value = item.country_id;
                option.textContent = item.country;
                select.appendChild(option);
            });
        }

        function preencherSelectCidades(lista) {
            const select = document.getElementById("cidade_endereco");
            if (!select) return;
            select.innerHTML = '<option value="">Selecione uma cidade...</option>';
            lista.forEach(item => {
                const option = document.createElement('option');
                option.value = item.city_id;
                option.textContent = item.city;
                select.appendChild(option);
            });
        }

        // --- LÓGICA DE ENVIO (POST) SEM RECARREGAR PÁGINA ---

        async function handleFormSubmit(event, url, bodyData) {
            event.preventDefault(); // Impede o envio padrão do formulário

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                const mensagem = await response.text();

                if (response.ok) {
                    alert("Sucesso: " + mensagem);
                    event.target.reset(); // Limpa o formulário
                    loadData(); // Atualiza os selects com os novos dados
                } else {
                    // Aqui exibe a mensagem de erro definida no main.js (ex: "País já cadastrado")
                    alert("Atenção: " + mensagem);
                }
            } catch (error) {
                alert("Erro ao conectar com o servidor.");
            }
        }

        // Evento Formulário País
        document.getElementById('formPais').addEventListener('submit', (e) => {
            const data = { pais: document.getElementById('pais').value };
            handleFormSubmit(e, 'http://localhost:3000/cadastrar_pais', data);
        });

        // Evento Formulário Cidade
        document.getElementById('formCidade').addEventListener('submit', (e) => {
            const data = { 
                cidade: document.getElementById('cidade').value,
                pais_cidade: document.getElementById('pais_cidade').value
            };
            handleFormSubmit(e, 'http://localhost:3000/cadastrar_cidade', data);
        });

        // Evento Formulário Endereço
        document.getElementById('formEndereco').addEventListener('submit', (e) => {
            const data = { 
                endereco: document.getElementById('endereco').value,
                cidade_endereco: document.getElementById('cidade_endereco').value
            };
            handleFormSubmit(e, 'http://localhost:3000/cadastrar_endereco', data);
        });

        // Carrega os dados iniciais
        loadData();

    </script>
</body>
</html>
