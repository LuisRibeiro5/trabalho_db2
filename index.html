<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação de Endereços</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        form {
            margin-bottom: 30px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        input, select, button {
            display: block;
            margin: 5px 0 10px;
            padding: 5px;
            width: 250px;
        }
        h2 {
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <form action="/cadastrar_pais" method="POST">
        <!-- Label associado ao input via 'for' e 'id' -->
        <label for="nome">Nome do País:</label>
        <input type="text" id="pais" name="pais" required>
      
        <!-- Botão para submeter o formulário -->
        <button type="submit">Enviar</button>
      </form>

      <form action="/cadastrar_cidade" method="POST">
        <!-- Label associado ao input via 'for' e 'id' -->
        <label for="nome">Nome da Cidade:</label>
        <input type="text" id="cidade" name="cidade" required>
      

        <label for="pais">Nome do país:</label>
        <input list="paises" type="text" id="pais_cidade" name="pais_cidade" required>

        <!-- Botão para submeter o formulário -->
        <button type="submit">Enviar</button>
      </form>

      <form action="/cadastrar_endereco" method="POST">
        <!-- Label associado ao input via 'for' e 'id' -->

        <label for="nome">Nome da rua e numero:</label>
        <input type="text" id="endereco" name="endereco" required>

        <label for="nome">Nome da Cidade:</label>
        <input list="cidades" type="text" id="cidade_endereco" name="cidade_endereco" required>
      
        <datalist id="cidades">
            <option value="padrão"></option>
          </datalist>

        <label for="pais">Nome do país:</label>
        <input list="paises" type="text" id="pais_endereco" name="pais_endereco" required>

        <datalist id="paises">
            <option value="padrão"></option>
          </datalist>
      
      
        <!-- Botão para submeter o formulário -->
        <button type="submit">Enviar</button>
      </form>

      
    
     <script>
async function loadData() {
            try {
                const cidadesResponse = await fetch('http://localhost:3000/listarCidades');
                const cidades = await cidadesResponse.json();
                preencherDatalist('cidades', cidades);
    
                const paisesResponse = await fetch('http://localhost:3000/listarPaises');
                const paises = await paisesResponse.json();
                preencherDatalist('paises', paises);
            } catch (err) {
                console.error('Erro ao carregar dados:', err);
            }
        }

        function preencherDatalist(id, lista) {
            const datalist = document.getElementById(id);
            if (!datalist) return;
    
            // Limpa e popula o datalist
            datalist.innerHTML = ''; 
            lista.forEach(item => {
                const option = document.createElement('option');
                option.value = item.country || item.city ;
                datalist.appendChild(option);
            });
        }
    
        loadData();

     </script>
</body>
</html>
